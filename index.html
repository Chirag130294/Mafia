<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAFIA - Party Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans h-screen w-screen overflow-hidden flex flex-col">

    <!-- Top Bar -->
    <header class="bg-gray-800 border-b border-gray-700 p-3 shadow-lg flex justify-between items-center z-10">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-user-secret text-red-500 text-2xl"></i>
            <h1 class="text-xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-yellow-500">MAFIA</h1>
        </div>
        <div id="room-badge" class="hidden bg-gray-700 px-3 py-1 rounded-full text-sm font-mono border border-gray-600">
            Room: <span id="display-room-code" class="text-red-400 font-bold"></span>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-container" class="flex-grow relative overflow-y-auto p-4 flex flex-col items-center justify-center">
        
        <!-- SCREEN: Login & Setup -->
        <div id="screen-login" class="screen-active w-full max-w-md mx-auto space-y-8">
            
            <!-- Animated Logo Section -->
            <div class="text-center mb-8">
                <div class="inline-block relative">
                    <i class="fa-solid fa-user-secret text-7xl text-red-600 drop-shadow-[0_0_15px_rgba(220,38,38,0.8)] logo-anim"></i>
                </div>
                <h2 class="text-4xl font-black mt-4 tracking-widest mafia-title">MAFIA</h2>
                <p class="text-gray-400 text-sm tracking-widest uppercase mt-1">The Gujarati Edition</p>
            </div>

            <!-- HOST SECTION (No name required) -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-2xl text-center">
                <h3 class="text-gray-400 mb-3 text-sm uppercase tracking-wide">Set up the board</h3>
                <button id="btn-create" onclick="GameEngine.createRoom()" class="w-full bg-red-600 hover:bg-red-700 text-white p-4 rounded-lg font-black tracking-wider shadow-lg active:scale-95 transition-all flex justify-center items-center gap-2">
                    <i class="fa-solid fa-tv"></i> Create Game (Host Screen)
                </button>
            </div>

            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-gray-700"></div>
                <span class="flex-shrink-0 mx-4 text-gray-500 text-sm">OR JOIN AS PLAYER</span>
                <div class="flex-grow border-t border-gray-700"></div>
            </div>

            <!-- PLAYER SECTION -->
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-2xl">
                <!-- Name (Mandatory) -->
                <input type="text" id="player-name" placeholder="Your Name (Required)" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg mb-4 text-white placeholder-gray-400 focus:outline-none focus:border-red-500">
                
                <!-- Avatar Picker (Optional) -->
                <p class="text-xs text-gray-400 mb-2 uppercase tracking-wide">Select Avatar (Optional)</p>
                <div class="flex justify-between gap-2 mb-4" id="avatar-container">
                    <img src="https://api.dicebear.com/9.x/avataaars/svg?seed=1" class="avatar-btn selected" data-seed="1" onclick="selectAvatar(this)">
                    <img src="https://api.dicebear.com/9.x/avataaars/svg?seed=2" class="avatar-btn" data-seed="2" onclick="selectAvatar(this)">
                    <img src="https://api.dicebear.com/9.x/avataaars/svg?seed=3" class="avatar-btn" data-seed="3" onclick="selectAvatar(this)">
                    <img src="https://api.dicebear.com/9.x/avataaars/svg?seed=4" class="avatar-btn" data-seed="4" onclick="selectAvatar(this)">
                    <img src="https://api.dicebear.com/9.x/avataaars/svg?seed=5" class="avatar-btn" data-seed="5" onclick="selectAvatar(this)">
                </div>

                <!-- Persona (Optional) -->
                <select id="player-persona" class="w-full p-3 bg-gray-700 border border-gray-600 rounded-lg mb-4 text-gray-300 focus:outline-none">
                    <option value="">-- Select Persona (Optional) --</option>
                    <option value="The Gossip Queen">The Gossip Queen</option>
                    <option value="The Logical Uncle">The Logical Uncle</option>
                    <option value="The Chai-Addict">The Chai-Addict</option>
                    <option value="The Secret Agent">The Secret Agent</option>
                    <option value="The Pol-no-Don">The Pol-no-Don</option>
                </select>
                
                <!-- Join Room -->
                <div class="flex gap-2 mt-6">
                    <input type="text" id="join-code" placeholder="ROOM CODE" class="w-1/2 p-3 bg-gray-700 border border-gray-600 rounded-lg text-center uppercase font-mono font-bold text-white focus:outline-none focus:border-yellow-500" maxlength="4">
                    <button id="btn-join" onclick="GameEngine.joinRoom()" class="w-1/2 bg-yellow-500 hover:bg-yellow-600 text-gray-900 rounded-lg font-black tracking-wider shadow-lg active:scale-95 transition-all">JOIN</button>
                </div>
            </div>
        </div>

        <!-- SCREEN: Lobby -->
        <div id="screen-lobby" class="screen-hidden w-full max-w-md mx-auto">
            <div id="host-header" class="hidden bg-gray-800 p-6 rounded-xl border border-red-500/50 shadow-[0_0_15px_rgba(220,38,38,0.2)] text-center mb-6">
                <p class="text-gray-400 uppercase tracking-widest text-sm mb-1">Room Code</p>
                <h1 class="text-6xl font-mono font-black text-red-500 tracking-widest" id="lobby-room-code">----</h1>
            </div>
            
            <h3 class="font-bold text-lg mb-4 text-gray-300 border-b border-gray-700 pb-2">Players Joined (<span id="player-count">0</span>)</h3>
            <ul id="player-list" class="space-y-3 mb-6 h-64 overflow-y-auto pr-2">
                <!-- Players load here -->
            </ul>

            <div id="host-lobby-controls" class="hidden mt-auto">
                <button onclick="GameEngine.startGame()" class="w-full bg-red-600 text-white p-4 rounded-lg font-black tracking-widest shadow-lg active:scale-95 transition-transform text-lg">START GAME</button>
            </div>
        </div>

        <!-- Add the other screens (Night, Vibe) here exactly as they were in the previous version, just styled dark -->
        <!-- I am omitting them here for brevity to focus on the fix, but keep them in your file! -->

    </main>

    <!-- Global scripts -->
    <script src="app.js"></script>
</body>
</html>
