<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gujarati Party Mafia</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PeerJS for Serverless Multiplayer -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-orange-50 text-gray-900 font-sans h-screen w-screen overflow-hidden flex flex-col">

    <!-- Top Bar -->
    <header class="bg-orange-600 text-white p-4 shadow-md flex justify-between items-center z-10">
        <h1 class="text-xl font-bold tracking-wide"><i class="fa-solid fa-mask"></i> Pol-no-Don</h1>
        <div id="room-badge" class="hidden bg-orange-800 px-3 py-1 rounded-full text-sm font-mono">Room: <span id="display-room-code"></span></div>
    </header>

    <!-- Main Content Area -->
    <main id="app-container" class="flex-grow relative overflow-y-auto p-4">
        
        <!-- SCREEN: Login & Setup -->
        <div id="screen-login" class="screen-active max-w-md mx-auto mt-10 text-center">
            <h2 class="text-2xl font-bold text-orange-700 mb-6">Welcome to the Pol</h2>
            <input type="text" id="player-name" placeholder="Enter your name" class="w-full p-4 border-2 border-orange-300 rounded-lg mb-4 text-lg focus:outline-none focus:border-orange-500">
            <select id="player-persona" class="w-full p-4 border-2 border-orange-300 rounded-lg mb-6 bg-white text-lg">
                <option value="The Gossip Queen">The Gossip Queen</option>
                <option value="The Logical Uncle">The Logical Uncle</option>
                <option value="The Chai-Addict">The Chai-Addict</option>
                <option value="The Over-thinker">The Over-thinker</option>
                <option value="The Secret Agent">The Secret Agent</option>
            </select>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="GameEngine.createRoom()" class="bg-orange-600 text-white p-4 rounded-lg font-bold shadow-lg active:scale-95 transition-transform">Create Game (Host)</button>
                <div class="flex flex-col">
                    <input type="text" id="join-code" placeholder="Room Code" class="p-2 border-2 border-orange-300 rounded-t-lg text-center uppercase font-mono">
                    <button onclick="GameEngine.joinRoom()" class="bg-yellow-500 text-orange-900 p-2 rounded-b-lg font-bold shadow-lg active:scale-95 transition-transform">Join Room</button>
                </div>
            </div>
        </div>

        <!-- SCREEN: Lobby -->
        <div id="screen-lobby" class="screen-hidden max-w-md mx-auto mt-4">
            <div class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-orange-500 text-center mb-6">
                <h3 class="text-lg text-gray-500">Waiting for players...</h3>
                <h1 class="text-4xl font-mono font-bold text-orange-600 my-2" id="lobby-room-code">ABCD</h1>
                <p class="text-sm text-gray-400">Share this code with your friends</p>
            </div>
            
            <h3 class="font-bold text-lg mb-2 text-orange-800">Players in Pol (<span id="player-count">0</span>)</h3>
            <ul id="player-list" class="space-y-2 mb-6">
                <!-- Player items injected here -->
            </ul>

            <!-- Host Controls -->
            <div id="host-lobby-controls" class="hidden">
                <button onclick="GameEngine.startGame()" class="w-full bg-green-600 text-white p-4 rounded-lg font-bold shadow-lg active:scale-95 transition-transform text-lg">Start Game</button>
            </div>
        </div>

        <!-- SCREEN: Night Phase (Universal Mask) -->
        <div id="screen-night" class="screen-hidden max-w-md mx-auto mt-4 flex flex-col h-full">
            <div class="text-center mb-4 relative">
                <h2 class="text-2xl font-bold text-indigo-900">Night has fallen</h2>
                <p class="text-gray-600">Choose your interaction.</p>
                
                <!-- Secret Role Reveal Button -->
                <button id="btn-reveal-role" class="absolute top-0 right-0 text-xs bg-gray-200 text-gray-500 px-2 py-1 rounded shadow-inner active:bg-indigo-600 active:text-white transition-colors select-none">
                    Hold to Reveal Role
                </button>
                <div id="secret-role-display" class="hidden absolute top-8 right-0 bg-indigo-800 text-white text-sm px-3 py-1 rounded shadow-lg font-bold z-20">
                    <!-- Role injected here -->
                </div>
            </div>

            <div class="flex-grow overflow-y-auto bg-white rounded-xl shadow-inner border border-gray-200 p-2 mb-4">
                <ul id="night-target-list" class="space-y-2">
                    <!-- Targetable players injected here -->
                </ul>
            </div>

            <button id="btn-confirm-night" onclick="GameEngine.submitNightAction()" class="w-full bg-indigo-600 text-white p-4 rounded-lg font-bold shadow-lg opacity-50 cursor-not-allowed transition-all" disabled>Confirm Selection</button>
        </div>

        <!-- SCREEN: Waiting / Day Phase (Chai Animation) -->
        <div id="screen-vibe" class="screen-hidden max-w-md mx-auto mt-10 text-center">
            <h2 id="vibe-title" class="text-3xl font-bold text-orange-700 mb-2">Chai Time!</h2>
            <p id="vibe-subtitle" class="text-gray-600 mb-8">Discuss and find the Kaali Toli.</p>
            
            <!-- Animations -->
            <div class="relative w-48 h-48 mx-auto mb-8">
                <div class="chai-cup absolute bottom-0 left-1/2 transform -translate-x-1/2 text-6xl text-orange-800">
                    <i class="fa-solid fa-mug-hot"></i>
                    <div class="steam steam-1"></div>
                    <div class="steam steam-2"></div>
                </div>
                <div id="khari-plate" class="khari-hidden absolute bottom-0 right-0 text-5xl text-yellow-600">
                    <i class="fa-solid fa-cookie"></i>
                </div>
            </div>

            <div id="timer-display" class="text-5xl font-mono font-bold text-orange-600 mb-8">01:30</div>

            <!-- Host Override Panel -->
            <div id="host-override-panel" class="hidden bg-gray-100 p-4 rounded-lg border border-gray-300">
                <h4 class="text-sm font-bold text-gray-500 mb-2">Admin Overrides</h4>
                <div class="flex gap-2">
                    <button onclick="GameEngine.addTime()" class="flex-1 bg-yellow-500 text-white p-2 rounded shadow">+30s (Khari)</button>
                    <button onclick="GameEngine.forcePhaseAdmin()" class="flex-1 bg-red-600 text-white p-2 rounded shadow"><i class="fa-solid fa-lock"></i> Force Next</button>
                </div>
            </div>
        </div>

    </main>

    <!-- Admin PIN Modal -->
    <div id="pin-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-xl shadow-2xl text-center">
            <h3 class="text-lg font-bold text-red-600 mb-4">System Admin Access</h3>
            <input type="password" id="admin-pin-input" placeholder="Enter PIN" class="w-full p-3 border rounded mb-4 text-center text-2xl tracking-widest" maxlength="4">
            <div class="flex gap-2">
                <button onclick="GameEngine.cancelPin()" class="flex-1 bg-gray-300 p-2 rounded">Cancel</button>
                <button onclick="GameEngine.submitPin()" class="flex-1 bg-red-600 text-white p-2 rounded font-bold">Authorize</button>
            </div>
        </div>
    </div>
</body>
</html>
